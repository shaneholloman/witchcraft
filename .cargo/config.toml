# Cargo configuration for rust-warp

# Enable AVX2 and FMA on Windows for better performance
[target.'cfg(windows)']
rustflags = ["-C", "target-cpu=haswell"]

# Enable native CPU features on Linux for better performance
# This will use AVX-512, AVX2, FMA, etc. based on the build machine's CPU
[target.'cfg(target_os = "linux")']
rustflags = ["-C", "target-cpu=native"]

